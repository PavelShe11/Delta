name: GitHub Release

on:
  push:
    branches:
      - master
    tags:
      - 'release/**'
      - 'release-github/**'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version name from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${TAG#*/}"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version name: $VERSION_NAME"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APKs
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ vars.VERSION_CODE }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ steps.version.outputs.name }}" \
            --notes "versionCode: ${{ vars.VERSION_CODE }}" \
            --draft \
            app/build/outputs/apk/release/*.apk
