name: Deploy to RuStore

on:
  push:
    tags:
      - 'release/**'
      - 'release-rustore/**'

permissions:
  actions: write

jobs:
  deploy:
    name: Build & Deploy to RuStore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version name from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${TAG#*/}"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version name: $VERSION_NAME"

      - name: Increment versionCode
        id: version_code
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CURRENT_CODE=${{ vars.VERSION_CODE }}
          NEW_CODE=$((CURRENT_CODE + 1))
          gh api repos/${{ github.repository }}/actions/variables/VERSION_CODE \
            -X PATCH \
            -f value="$NEW_CODE"
          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "versionCode: $CURRENT_CODE → $NEW_CODE"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version_code.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-aab-${{ steps.version.outputs.name }}-${{ steps.version_code.outputs.code }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

      - name: Extract tag message
        id: tag_msg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MSG=$(git for-each-ref --format='%(contents:subject)' "refs/tags/$TAG")
          echo "whats_new=$MSG" >> "$GITHUB_OUTPUT"
          echo "whats_new: $MSG"

      - name: Deploy to RuStore
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
          WHATS_NEW: ${{ steps.tag_msg.outputs.whats_new }}
        run: bash .github/scripts/rustore-deploy.sh
