name: Deploy to RuStore

on:
  push:
    tags:
      - 'release/**'

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    name: Build & Deploy to RuStore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version name from tag
        id: version
        run: |
          # Из тега release/0.0.1 берём всё после release/
          VERSION_NAME="${GITHUB_REF#refs/tags/release/}"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version name: $VERSION_NAME"

      - name: Increment versionCode
        id: version_code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_CODE=${{ vars.VERSION_CODE }}
          NEW_CODE=$((CURRENT_CODE + 1))
          gh api repos/${{ github.repository }}/actions/variables/VERSION_CODE \
            -X PATCH \
            -f value="$NEW_CODE"
          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "versionCode: $CURRENT_CODE → $NEW_CODE"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version_code.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Install Python cryptography
        run: pip install cryptography

      - name: Authenticate with RuStore API
        id: rustore_auth
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
        run: |
          python3 << 'PYEOF'
          import base64, json, os, time, urllib.request, urllib.error
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          key_id = os.environ['RUSTORE_KEY_ID']
          private_key_b64 = os.environ['RUSTORE_PRIVATE_KEY']
          timestamp = str(int(time.time() * 1000))

          private_key_bytes = base64.b64decode(private_key_b64)
          private_key = serialization.load_der_private_key(private_key_bytes, password=None)

          message = (key_id + timestamp).encode('utf-8')
          signature = private_key.sign(message, padding.PKCS1v15(), hashes.SHA512())
          signature_b64 = base64.b64encode(signature).decode('utf-8')

          payload = json.dumps({
              'keyId': key_id,
              'timestamp': timestamp,
              'signature': signature_b64
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://public-api.rustore.ru/public/auth',
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  print(f"Auth response code: {result.get('code')}")
                  body = result.get('body', result)
                  token = body['jwe']
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f'token={token}\n')
          except urllib.error.HTTPError as e:
              print(f"HTTP Error {e.code}: {e.read().decode()}")
              raise
          PYEOF

      - name: Create draft version in RuStore
        id: create_draft
        env:
          RUSTORE_TOKEN: ${{ steps.rustore_auth.outputs.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          token = os.environ['RUSTORE_TOKEN']
          package = 'io.github.pavelshel1.delta'

          payload = json.dumps({'publishType': 'MANUAL'}).encode('utf-8')

          req = urllib.request.Request(
              f'https://public-api.rustore.ru/public/v1/application/{package}/version',
              data=payload,
              headers={
                  'Public-Token': token,
                  'Content-Type': 'application/json'
              },
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  print(f"Create draft response: {result.get('code')}")
                  body = result.get('body', result)
                  version_id = body['versionId']
                  print(f"Draft version ID: {version_id}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f'version_id={version_id}\n')
          except urllib.error.HTTPError as e:
              print(f"HTTP Error {e.code}: {e.read().decode()}")
              raise
          PYEOF

      - name: Upload AAB to RuStore
        env:
          RUSTORE_TOKEN: ${{ steps.rustore_auth.outputs.token }}
          VERSION_ID: ${{ steps.create_draft.outputs.version_id }}
        run: |
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "Uploading: $AAB_PATH"
          curl --fail --show-error --location \
            --request POST \
            "https://public-api.rustore.ru/public/v1/application/io.github.pavelshel1.delta/version/${VERSION_ID}/aab" \
            --header "Public-Token: ${RUSTORE_TOKEN}" \
            --form "file=@${AAB_PATH}"

      - name: Build signed release APKs (ABI splits)
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ steps.version_code.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Collect APK paths
        id: apks
        run: |
          APK_FILES=$(find app/build/outputs/apk/release -name "*.apk" | tr '\n' ' ')
          echo "paths=$APK_FILES" >> "$GITHUB_OUTPUT"
          echo "Found APKs:"
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ steps.version.outputs.name }}" \
            --notes "versionCode: ${{ steps.version_code.outputs.code }}" \
            --draft \
            app/build/outputs/apk/release/*.apk

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-aab-${{ steps.version.outputs.name }}-${{ steps.version_code.outputs.code }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14
